<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment2</title>
    <style>
        body{   
            font-family: Arial, sans-serif;
            background-color: black;
            margin: 0;
            padding: 0;
        }
        h1{
            background-color: black;

        }
        input{
            width: 1400px;

        #sendBtn{
            padding: 8px;
            margin: 0;
            height: 40px;
            width: 100px;
            font-size: large;
            background-color: rgb(249, 86, 86);
            color: white;
            font-family: Arial, Helvetica, sans-serif;

        #sendBtn:active{
            background-color: rgb(140, 9, 9);

        /* #message, #username{
            width: 200px;
        } */
        #messages{
            overflow-y: auto;
            padding: 10px;

        }
        p{
            background-color: #56beff;
            padding: 10px 10px;
            margin: 5px 0;
            border-radius: 10px;
            /* width: fit-content; */
        }
        .container{
            margin-top: 0px;
            /* background-color: white; */
            /* width: 200lvh; */
            /* overflow-y: auto; */
            /* max-height: 100vh; */
            /* align-items: normal; */
            /* justify-self: center; */
            padding: 10px 10px;
            /* box-shadow: 2px 2px 5px rgb(165, 165, 165); */
        }
        .myMsg{
            align-self: flex-end;
            background-color: rgb(7, 46, 54);
            text-align: right;
            right: 0;
            color: white;
        }
        .otherMsg{
            align-self: flex-start;
            background-color: rgb(72, 97, 102);
            text-align: left;
            color: white;
        }
        .btnContainer{
            bottom: 0;
            left: 0;
            position: fixed;
            width: 100%;
            background-color: black;
        }
        .pCenter{
            text-align: center;
        }
    </style>

</head>
<body>
    <h1>ChatRoom</h1>
    <!-- <input type="text" id="username" placeholder="Enter username"> -->
    <div class="container">
        <!-- <h3 id="userName">You are: </h3> -->
        <div id="messages"></div>
    </div>
    <div class="btnContainer">
        <input type="text" id="message" placeholder="Enter message">
        <input type="file" id="file" placeholder="Choose file to send">
        <button type="button" id="sendBtn">Send</button>
    </div>
    
    <!-- <script src="/socket.io/socket.io.js"></script> -->
     <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        let user = prompt("Enter username") || "Anonymous";
        const socket = io("https://fileshare-1gsp.onrender.com" );
        const sendBtn = document.getElementById('sendBtn');
        const usernameInput = user;
        const messageInput = document.getElementById('message');
        const messageContainer = document.getElementById('messages');
        const fileInput = document.getElementById('file');

        console.log(user);
        console.log(usernameInput);
        const username = usernameInput;
        console.log(username);
        if(username){socket.emit("userEntered",username)};

        socket.on('userEntered',(username)=>{
            const p = document.createElement("p");
            p.innerText=`---------- ${username} : entered the chatroom -----------`;
            p.classList.add('pCenter');
            messageContainer.appendChild(p);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        });

        socket.on("exit",(username)=>{
            const p = document.createElement("p");
            // p.innerText=`---------- ${data.username} : left the chatroom -----------`;
            p.innerText=`---------- ${username} : left the chatroom -----------`;
            p.classList.add('pCenter');
            messageContainer.appendChild(p);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        })


        socket.on('message',(data)=>{
            const p = document.createElement("p");
            if(data.username===username){
                p.innerText=`You : ${data.message}`;
                p.classList.add("myMsg");
            }
            else{
                p.innerText = `${data.username} : ${data.message}`;
                p.classList.add("otherMsg");
            }
            messageContainer.appendChild(p);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        });

        sendBtn.addEventListener("click",()=>{
            const username = usernameInput;
            const message = messageInput.value.trim();

            if(username && message){
                socket.emit("user-message" , {username,message});
                messageInput.value="";
            }
            else{
                alert("Both user Name and message are required!!")
            }
        });
        
        function send(){
            const username = usernameInput;
            const message = messageInput.value.trim();

            if(username && message){
                socket.emit("user-message" , {username,message});
                messageInput.value="";
            }
            else{
                alert("Both user Name and message are required!!")
            }
        }
        // call send function on press of enter;
        messageInput.addEventListener("keydown", (event)=>{
            if(event.key==="Enter"){
                send();
            }
        });


        //file upload and recieve;
        fileInput.addEventListener('change',()=>{
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = ()=>{
                socket.emit('upload-file',{
                    file:reader.result,
                    fileName:file.name,
                    fileType:file.type
                });
            };
            reader.readAsArrayBuffer(file);
        }); 

        socket.on('recieve-file',(data)=>{
            const blob = new Blob([data.file],{type:data.fileType});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download=data.fileName;
            a.click();
            URL.revokeObjectURL(url);
        });

    </script>
</body>
</html>
