    <style>
        ::-webkit-scrollbar{
            width: 8px;
        }
        ::-webkit-scrollbar-track{
            background: #2d3439;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb{
            background: #13a3ce;
            border-radius: 10px;
        }

        body{   
            font-family: Arial, sans-serif;
            background-color: black;
            margin: 0;
            padding: 0;
        }

        /* HEADER */
        h1{
            color: aqua;
            padding: 10px;
            margin:0;
            text-align: center;
            position: sticky;
            top: 0;
            background: black;
            z-index: 10;
        }

        /* TOP BAR */
        .topBar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* FILE INPUT */
        #file{
            font-size: 14px;
            padding: 0px;
            /* margin-right: 10px; */
            width: fit-content;
            height: fit-content;
            font-size: large;
            background-color: rgb(249, 86, 86);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border: none;
            /* box-shadow: 2px 2px 2px rgb(105, 105, 105); */
            border-radius: 5px;
            outline: none;
            /* height: 30px; */
            /* width: 140px; */
        }

        input[type="file"]::file-selector-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* USERNAME */
        h3{
            color: white;
            font-size: 16px;
        }

        /* CHAT CONTAINER */
        .container{
            padding: 10px;
        }

        #messages{
            overflow-y: auto;
            height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* MESSAGES */
        p{
            padding: 10px;
            border-radius: 10px;
            max-width: 75%;
            word-wrap: break-word;
            background-color: #56beff;
        }

        .myMsg{
            align-self: flex-end;
            background-color: rgb(7, 46, 54);
            color: white;
        }

        .otherMsg{
            align-self: flex-start;
            background-color: rgb(72, 97, 102);
            color: white;
        }

        .pCenter{
            text-align: center;
            align-self: center;
        }

        /* INPUT BAR */
        .btnContainer{
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 10px;
            background: black;
            box-sizing: border-box;
        }

        /* MESSAGE INPUT */
        #message{
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        /* SEND BUTTON */
        #sendBtn{
            padding: 10px 15px;
            background-color: rgb(249, 86, 86);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #sendBtn:active{
            background-color: rgb(140, 9, 9);
        }

        /* LINKS */
        a{
            color: lightblue;
        }

        /* 📱 MOBILE RESPONSIVE */
        @media (max-width: 768px) {

            h1{
                font-size: 20px;
            }

            h3{
                font-size: 14px;
            }

            #messages{
                height: calc(100vh - 230px);
            }

            p{
                max-width: 90%;
                font-size: 14px;
            }

            #sendBtn{
                padding: 8px;
                font-size: 14px;
            }

            #message{
                font-size: 14px;
            }
        }

        /* 📱 SMALL DEVICES */
        @media (max-width: 480px){

            .topBar{
                flex-direction: column;
                align-items: flex-start;
            }

            #messages{
                height: calc(100vh - 260px);
            }

            .btnContainer{
                flex-direction: column;
            }

            #sendBtn{
                width: 100%;
            }
        }
    </style>

</head>
<body>
    <h1>ChatRoom</h1>
    <div class="topBar">
        <input type="file" id="file">
        <h3  id="username">Username :  </h3>
    </div>
    <div class="container">
        <div id="messages"></div>
    </div>
    <div class="btnContainer">
        <input type="text" id="message" placeholder="Enter message">
        <button type="button" id="sendBtn">Send</button>
    </div>
    
    <!-- <script src="/socket.io/socket.io.js"></script> -->
     <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        let user = prompt("Enter username") || "Anonymous";
        const socket = io("https://fileshare-1gsp.onrender.com" );
        // const socket = io();
        const sendBtn = document.getElementById('sendBtn');
        const usernameInput = user;
        const messageInput = document.getElementById('message');
        const messageContainer = document.getElementById('messages');
        const fileInput = document.getElementById('file');
        const uname = document.getElementById('username');
        
        
        console.log(user);
        console.log(usernameInput);
        const username = usernameInput;
        console.log(username);
        if(username){socket.emit("userEntered",username)};

        uname.innerText+=` ${usernameInput}`;

        socket.on('userEntered',(username)=>{
            const p = document.createElement("p");
            p.innerText=`---------- ${username} : entered the chatroom -----------`;
            p.classList.add('pCenter');
            messageContainer.appendChild(p);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        });

        socket.on("exit",(username)=>{
            const p = document.createElement("p");
            // p.innerText=`---------- ${data.username} : left the chatroom -----------`;
            p.innerText=`---------- ${username} : left the chatroom -----------`;
            p.classList.add('pCenter');
            messageContainer.appendChild(p);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        })


        socket.on('message',(data)=>{
            const p = document.createElement("p");
            if(data.username===username){
                p.innerText=`You : ${data.message}`;
                p.classList.add("myMsg");
                p.classList.add("newMsg");
            }
            else{
                p.innerText = `${data.username} : ${data.message}`;
                p.classList.add("otherMsg");
                p.classList.add("newMsg");
            }
            messageContainer.appendChild(p);
            messageContainer.scrollTop = messageContainer.scrollHeight;
        });

        sendBtn.addEventListener("click",()=>{
            const username = usernameInput;
            const message = messageInput.value.trim();

            if(username && message){
                socket.emit("user-message" , {username,message});
                messageInput.value="";
            }
            else{
                alert("Both user Name and message are required!!")
            }
        });
        
        function send(){
            const username = usernameInput;
            const message = messageInput.value.trim();

            if(username && message){
                socket.emit("user-message" , {username,message});
                messageInput.value="";
            }
            else{
                alert("Both user Name and message are required!!")
            }
        }
        // call send function on press of enter;
        messageInput.addEventListener("keydown", (event)=>{
            if(event.key==="Enter"){
                send();
            }
        });


        //file upload and recieve;
        fileInput.addEventListener('change',()=>{
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = ()=>{
                socket.emit('upload-file',{
                    file:reader.result,
                    fileName:file.name,
                    fileType:file.type
                });
            };
            reader.readAsArrayBuffer(file);
            alert("file sent");
        }); 

        socket.on('recieve-file',(data)=>{
            const blob = new Blob([data.file],{type:data.fileType});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download=data.fileName;
            // a.click();
            a.textContent=data.fileName;


            const p = document.createElement("p");   
            p.textContent="click the file name to download file, it will be available for 10 sec. only : " ;
            p.appendChild(a);
            p.classList.add("otherMsg");
            p.classList.add("newMsg");
            messageContainer.appendChild(p);
            
            messageContainer.scrollTop = messageContainer.scrollHeight;
            setTimeout(() => {
                alert(`${data.fileName} is no longer available to download.`);
                URL.revokeObjectURL(url);
            }, 10000);
            
            // URL.revokeObjectURL(url);
        });

    </script>
</body>
