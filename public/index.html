<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment2</title>
    <style>
        body{   
            font-family: Arial, sans-serif;
            background-color: black;
            margin: 0;
            padding: 0;
        }
        h1{
            background-color: black;
            color: aqua;
            padding: 10px;
            margin:0;
            text-align: center;
            position:sticky;
            
        }
        input{
            width: 1400px;
            height: 30px;
            padding: 8px;
            margin: 0;
            border: none;
            border-radius: 4px;
            box-shadow: 2px 2px 2px rgb(123, 123, 123);
            outline: none;
            font-size: large;
        }
        #sendBtn{
            padding: 8px;
            margin: 0;
            height: 40px;
            width: 100px;
            font-size: large;
            background-color: rgb(249, 86, 86);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border: none;
            box-shadow: 2px 2px 2px rgb(105, 105, 105);
            border-radius: 4px;
            outline: none;
        }
        
        #sendBtn:active{
            background-color: rgb(140, 9, 9);
            box-shadow: none;
        }
        
        /* #message, #username{
            width: 200px;
        } */
        #messages{
            overflow-y: auto;
            padding: 10px;
            max-height: 70vh;
        }
        p{
            background-color: #d5ecfa;
            padding: 10px 10px;
            margin: 5px 0;
            border-radius: 10px;
            /* width: fit-content; */
        }
        .container{
            margin-top: 0px;
            /* background-color: white; */
            /* width: 200lvh; */
            /* overflow-y: auto; */
            /* max-height: 100vh; */
            /* align-items: normal; */
            /* justify-self: center; */
            padding: 10px 10px;
            /* box-shadow: 2px 2px 5px rgb(165, 165, 165); */
        }
        .myMsg{
            align-self: flex-end;
            background-color: rgb(9, 206, 232);
            text-align: right;
            right: 0;
        }
        .otherMsg{
            align-self: flex-start;
            background-color: rgb(188, 242, 250);
            text-align: left;
        }
        .btnContainer{
            bottom: 0;
            left: 0;
            position: fixed;
            width: 100%;
            background-color: black;
        }
        .pCenter{
            text-align: center;
        }
    </style>

</head>
<body>
    <h1>ChatRoom</h1>
    <!-- <input type="text" id="username" placeholder="Enter username"> -->
    <div class="container">
        <!-- <h3 id="userName">You are: </h3> -->
        <div id="messages"></div>
    </div>
    <div class="btnContainer">
        <input type="text" id="message" placeholder="Enter message">
        <button type="button" id="sendBtn">Send</button>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let user = prompt("Enter username");
        const socket = io();
        const sendBtn = document.getElementById('sendBtn');
        const usernameInput = user;
        const messageInput = document.getElementById('message');
        const messageContainer = document.getElementById('messages');

        console.log(user);
        console.log(usernameInput);
        const username = usernameInput;
        console.log(username);
        if(username){socket.emit("userEntered",username)};

        socket.on('userEntered',(username)=>{
            const p = document.createElement("p");
            p.innerText=`---------- ${username} : entered the chatroom -----------`;
            p.classList.add('pCenter');
            messageContainer.appendChild(p);
        });

        socket.on("exit",(username)=>{
            const p = document.createElement("p");
            // p.innerText=`---------- ${data.username} : left the chatroom -----------`;
            p.innerText=`---------- :${username} left the chatroom -----------`;
            p.classList.add('pCenter');
            messageContainer.appendChild(p);
        })


        socket.on('message',(data)=>{
            const p = document.createElement("p");
            if(data.username===username){
                p.innerText=`You : ${data.message}`;
                p.classList.add("myMsg");
            }
            else{
                p.innerText = `${data.username || "Anonymous"} : ${data.message}`;
                p.classList.add("otherMsg");
            }
            messageContainer.appendChild(p);
        });

        sendBtn.addEventListener("click",()=>{
            const username = usernameInput;
            const message = messageInput.value.trim();

            if(username && message){
                socket.emit("user-message" , {username,message});
                messageInput.value="";
            }
            else{
                alert("Both user Name and message are required!!")
            }
        });
        
    </script>
</body>
</html>
